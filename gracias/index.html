<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>¡Registro recibido! · Gameplay Alliance</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#030306; --accent:#C28AFF; --white:#FFF;
    --text:#F2EFFA; --muted:#6B5F82; --divider:#3D2A5B;
    --card-bg:#08080D; --card-border:#241B37;
    --font:"Inter", Arial, Helvetica, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  .page{
    position:fixed; inset:0; width:100%; height:100vh;
    background:var(--bg);
    background-image:
      radial-gradient(circle at 50% 0%, rgba(178,113,255,0.18) 0%, rgba(3,3,6,0) 40%),
      radial-gradient(circle at 0% 40%, rgba(126,83,255,0.13) 0%, rgba(3,3,6,0) 35%),
      radial-gradient(circle at 100% 55%, rgba(181,97,255,0.12) 0%, rgba(3,3,6,0) 35%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:var(--font); padding:20px; gap:32px; text-align:center;
  }
  .logo{ display:block; width:260px; height:auto; }
  .card{
    background:var(--card-bg); border:1px solid var(--card-border);
    border-radius:22px; padding:52px 48px; text-align:center;
    max-width:520px; width:100%;
  }
  .label{
    margin:0 0 14px 0; font-size:12px; font-weight:900; color:var(--accent);
    letter-spacing:2.4px; text-transform:uppercase;
  }
  .titulo{
    margin:0 0 20px 0; font-size:38px; font-weight:900; color:var(--white);
    letter-spacing:-1px; line-height:1.05;
  }
  .ac{ color:var(--accent); }
  .divider{
    height:1px; background:var(--divider); margin:0 0 28px 0; border:none; width:100%;
  }
  .texto{
    margin:0 0 20px 0; font-size:16px; color:var(--text); line-height:1.68;
  }
  .texto strong{ color:var(--white); }
  .muted{
    margin:0; font-size:13px; color:var(--muted); line-height:1.6;
  }
  @media (max-width:479px){
    .page{ padding:48px 28px; gap:0; }
    .logo{ width:160px; margin-bottom:48px; }
    .card{ background:transparent; border:none; border-radius:0; padding:0; }
    .label{ font-size:11px; margin-bottom:12px; }
    .titulo{ font-size:36px; margin-bottom:20px; }
    .divider{ margin:0 0 32px 0; }
    .texto{ line-height:1.7; }
  }
</style>
</head>
<body>
  <div class="page">
    <img class="logo" src="https://bucket.mailersendapp.com/351ndgwzmqgzqx8k/nrw7gym856kg2k8e/images/a1de05db-3de6-4fd4-84f6-542a48bc8aa0.jpeg" alt="Gameplay Alliance">
    <div class="card">
      <p class="label">¡Registro recibido!</p>
      <h1 class="titulo">Ya casi<br>estás<span class="ac">.</span></h1>
      <hr class="divider">
      <p class="texto">
        Te enviamos un email a tu casilla para confirmar tu dirección.<br>
        Revisá tu bandeja de entrada y hacé clic en el link para activar tu cuenta en <strong>Gameplay Alliance</strong>.
      </p>
      <p class="muted">¿No lo encontrás? Revisá la carpeta de spam o correo no deseado.</p>
    </div>
  </div>
</body>
</html>
