<style>
  html,body{margin:0;padding:0;background:#07060d;}

.gp-cs-stage {
  --violet:#8b5cf6; --violet-2:#a78bfa; --violet-deep:#5b21b6;
  --display:"Saira Condensed", system-ui, sans-serif;
  --ui:"Space Grotesk", system-ui, sans-serif;
  position:relative; width:100%; min-height:100vh; overflow:hidden;
  background-color:#07060d; background-size:cover; background-position:top center;
  display:grid; place-items:center; font-family:var(--ui);
}
.gp-cs-dim {
  position:absolute; inset:0;
  background:rgba(7,6,13,0.5);
  backdrop-filter:blur(3px) saturate(0.85);
  -webkit-backdrop-filter:blur(3px) saturate(0.85);
}
.gp-cs-band {
  position:relative; z-index:2;
  width:130%; margin-left:-15%; padding:38px 0;
  background:
    linear-gradient(180deg, rgba(167,139,250,0.10), rgba(139,92,246,0.04)),
    linear-gradient(90deg, #5b21b6 0%, #7c3aed 50%, #5b21b6 100%);
  border-top:2px solid var(--violet-2); border-bottom:2px solid var(--violet-2);
  box-shadow:0 0 0 1px rgba(139,92,246,0.4), 0 40px 120px -30px rgba(139,92,246,0.7), inset 0 1px 0 rgba(255,255,255,0.18);
  transform:rotate(-4deg); opacity:1; overflow:hidden;
  animation:gpCsRise .6s cubic-bezier(.2,.85,.25,1) both;
}
.gp-cs-band::after {
  content:""; position:absolute; inset:0;
  background:repeating-linear-gradient(-45deg, rgba(255,255,255,0.05) 0 14px, transparent 14px 28px);
  pointer-events:none;
}
@keyframes gpCsRise {
  from { transform:rotate(-4deg) scale(.94); }
  to   { transform:rotate(-4deg) scale(1); }
}
@media (prefers-reduced-motion: reduce) { .gp-cs-band { animation:none; } }
.gp-cs-text {
  font-family:var(--display); font-weight:900;
  font-size:clamp(48px, 9vw, 128px); line-height:.9; letter-spacing:.04em;
  text-transform:uppercase; text-align:center; color:#fff; margin:0;
  text-shadow:0 2px 0 rgba(0,0,0,0.25), 0 0 40px rgba(167,139,250,0.55);
}
.gp-cs-sub {
  text-align:center; margin:14px auto 0; max-width:80%;
  font-family:var(--display); font-weight:700; letter-spacing:.14em;
  text-transform:uppercase; font-size:clamp(11px, 1.4vw, 16px);
  color:rgba(245,243,255,0.9); text-wrap:balance;
}
.gp-cs-social { display:flex; gap:14px; justify-content:center; margin-top:20px; }
.gp-cs-social-btn {
  width:48px; height:48px; border-radius:999px; display:grid; place-items:center;
  color:#fff; text-decoration:none; background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.45); box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);
  transition:background .15s, transform .1s, border-color .15s;
}
.gp-cs-social-btn:hover {
  background:#fff; color:var(--violet-deep); border-color:#fff; transform:translateY(-2px);
}
.gp-cs-social-btn:active { transform:translateY(0); }

</style>
